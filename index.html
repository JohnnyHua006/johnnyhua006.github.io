<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤫</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #1A1210;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    padding: 24px;
  }

  .lock-card {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .lock-icon {
    font-size: 32px;
    margin-bottom: 20px;
    opacity: 0.6;
  }

  .lock-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: #F5E6D3;
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .lock-sub {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #C9A94B;
    margin-bottom: 36px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  #pw-input {
    width: 100%;
    padding: 14px 48px 14px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #F5E6D3;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.08em;
    outline: none;
    transition: border-color 0.2s;
  }

  #pw-input:focus { border-color: rgba(201,169,75,0.5); }
  #pw-input.error { border-color: rgba(192,64,64,0.6); animation: shake 0.35s ease; }

  #toggle-vis {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #888;
    font-size: 16px;
    padding: 4px;
    line-height: 1;
  }

  #unlock-btn {
    width: 100%;
    padding: 14px;
    background: #C9A94B;
    border: none;
    border-radius: 8px;
    color: #1A1210;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  #unlock-btn:hover { opacity: 0.88; }
  #unlock-btn:active { transform: scale(0.98); }
  #unlock-btn:disabled { opacity: 0.4; cursor: default; }

  #error-msg {
    margin-top: 14px;
    font-size: 12px;
    color: #C04040;
    letter-spacing: 0.05em;
    min-height: 18px;
  }

  #loading-msg {
    margin-top: 14px;
    font-size: 12px;
    color: #C9A94B;
    letter-spacing: 0.1em;
    min-height: 18px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    40%      { transform: translateX(6px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }
</style>
</head>
<body>
<div class="lock-card">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">Shhhhhh<br>🔐</div>
  <div class="lock-sub">It's a secret</div>

  <div class="input-wrap">
    <input id="pw-input" type="password" placeholder="Enter password" autocomplete="current-password" />
    <button id="toggle-vis" type="button" onclick="toggleVis()" aria-label="Show/hide password">👁</button>
  </div>
  <button id="unlock-btn" onclick="unlock()">Unlock</button>
  <div id="error-msg"></div>
  <div id="loading-msg">Decrypting…</div>
</div>

  const ITERATIONS = 200000;

  async function unlock() {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;

    const btn     = document.getElementById('unlock-btn');
    const errEl   = document.getElementById('error-msg');
    const loadEl  = document.getElementById('loading-msg');
    const input   = document.getElementById('pw-input');

    btn.disabled = true;
    errEl.textContent = '';
    loadEl.style.opacity = '1';
    input.classList.remove('error');

    try {
      const raw      = Uint8Array.from(atob(BLOB), c => c.charCodeAt(0));
      const salt     = raw.slice(0, 16);
      const iv       = raw.slice(16, 28);
      const authTag  = raw.slice(28, 44);
      const cipher   = raw.slice(44);

      const keyMaterial = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );

      const cipherWithTag = new Uint8Array(cipher.length + authTag.length);
      cipherWithTag.set(cipher);
      cipherWithTag.set(authTag, cipher.length);

      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv },
        key,
        cipherWithTag
      );

      const html = new TextDecoder().decode(decrypted);

      // Update tab title before replacing the document
      document.title = 'Italy 2026';

      document.open();
      document.write(html);
      document.close();

    } catch (e) {
      loadEl.style.opacity = '0';
      btn.disabled = false;
      errEl.textContent = 'Incorrect password. Try again.';
      input.classList.add('error');
      input.value = '';
      input.focus();
    }
  }

  function toggleVis() {
    const input = document.getElementById('pw-input');
    if (input.getAttribute('type') === 'password') {
      input.setAttribute('type', 'text');
      document.getElementById('toggle-vis').textContent = '🙈';
    } else {
      input.setAttribute('type', 'password');
      document.getElementById('toggle-vis').textContent = '👁';
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
  });
</script>
